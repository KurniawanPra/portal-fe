
<style>
  #erd { width:100%; overflow-x:auto; padding:8px 0; }
  #erd svg { max-width:100%; }
</style>
<div id="erd"></div>
<script type="module">
import mermaid from 'https://esm.sh/mermaid@11/dist/mermaid.esm.min.mjs';
const dark = matchMedia('(prefers-color-scheme: dark)').matches;
await document.fonts.ready;
mermaid.initialize({
  startOnLoad: false,
  theme: 'base',
  fontFamily: '"Anthropic Sans", sans-serif',
  themeVariables: {
    darkMode: dark,
    fontSize: '13px',
    fontFamily: '"Anthropic Sans", sans-serif',
    lineColor: dark ? '#9c9a92' : '#73726c',
    textColor: dark ? '#c2c0b6' : '#3d3d3a',
    primaryColor: dark ? '#2a2840' : '#EEEDFE',
    primaryBorderColor: dark ? '#534AB7' : '#534AB7',
    primaryTextColor: dark ? '#CECBF6' : '#3C3489',
    secondaryColor: dark ? '#083328' : '#E1F5EE',
    tertiaryColor: dark ? '#221a00' : '#FDF6E3',
    tertiaryBorderColor: dark ? '#8a6800' : '#b8920a',
    tertiaryTextColor: dark ? '#fde68a' : '#5c4a00',
  },
});

const diagram = `erDiagram

  user {
    uuid id PK
    string email
    string password_hash
    boolean is_active
    string role
    timestamp last_login
    uuid employee_id FK
  }

  employee {
    uuid id PK
    string nrk
    string nik
    string nama
    string jenis_kelamin
    string jabatan
    string grade
    uuid atasan_id FK
    uuid bagian_id FK
    uuid sub_bagian_id FK
    date tanggal_masuk
    string tempat_lahir
    date tanggal_lahir
    string foto_profil
    uuid status_karyawan_id FK
    uuid pendidikan_terakhir_id FK
    uuid status_pernikahan_id FK
    string nomor_hp
    text alamat
    boolean is_active
  }

  bagian {
    uuid id PK
    string nama
    string kode
    boolean is_active
  }

  sub_bagian {
    uuid id PK
    string nama
    string kode
    uuid bagian_id FK
    boolean is_active
  }

  aplikasi {
    uuid id PK
    string nama
    string url
    string auth_mode
    string icon
    string deskripsi
    int urutan
    boolean is_active
  }

  app_user_access {
    uuid id PK
    uuid user_id FK
    uuid app_id FK
    timestamp granted_at
  }

  ref_status_karyawan {
    uuid id PK
    string kode
    string label
  }

  ref_pendidikan {
    uuid id PK
    string kode
    string label
    int urutan
  }

  ref_status_pernikahan {
    uuid id PK
    string kode
    string label
  }

  employee ||--o{ employee : "atasan_id"
  employee }o--|| bagian : "bertugas di"
  employee }o--|| sub_bagian : "bertugas di"
  sub_bagian }o--|| bagian : "bagian dari"
  employee }o--|| ref_status_karyawan : "berstatus"
  employee }o--|| ref_pendidikan : "pendidikan"
  employee }o--|| ref_status_pernikahan : "status nikah"
  user ||--o| employee : "akun milik"
  user ||--o{ app_user_access : "punya akses"
  aplikasi ||--o{ app_user_access : "diakses oleh"
  user }o--o| user : "granted_by"
`;

const { svg } = await mermaid.render('erd-svg', diagram);
document.getElementById('erd').innerHTML = svg;
</script>
